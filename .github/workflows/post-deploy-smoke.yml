name: Post-Deploy E2E Tests

# Triggered by Vercel when it posts a deployment_status event back to GitHub.
# Runs the full Playwright E2E suite against the exact URL that was just
# deployed so env-var gaps, migration misses, auth issues, and JS console
# errors are caught immediately for every preview and production deploy.
on:
  deployment_status:

jobs:
  e2e:
    name: Playwright E2E tests (${{ matrix.shard }}/${{ matrix.total-shards }})
    # Only run when the deployment finished successfully
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        total-shards: [3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install chromium --with-deps
          fi

      - name: Run E2E shard ${{ matrix.shard }}/${{ matrix.total-shards }}
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: npx playwright test --shard=${{ matrix.shard }}/${{ matrix.total-shards }}

      - name: Upload shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}-${{ github.sha }}
          path: frontend/playwright-report/
          retention-days: 14
